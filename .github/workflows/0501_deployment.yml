name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build \
            --file src/Dockerfile \
            --tag "$IMAGE_TAG" \
            ./src
          docker push "$IMAGE_TAG"

      - name: Update Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              foundry-endpoint="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt-endpoint="${{ secrets.gpt_endpoint }}" \
              embedding-endpoint="${{ secrets.embedding_endpoint }}" \
              phi-4-endpoint="${{ secrets.phi_4_endpoint }}"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --set-env-vars \
              FOUNDRY_ENDPOINT=secretref:foundry-endpoint \
              gpt_endpoint=secretref:gpt-endpoint \
              embedding_endpoint=secretref:embedding-endpoint \
              phi_4_endpoint=secretref:phi-4-endpoint